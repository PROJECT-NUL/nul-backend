server:
  http2:
    enabled: true

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_DB_SERVER_ADDRESS:localhost}:${POSTGRES_DB_SERVER_PORT:5432}/postgres
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:example}
    hikari:
      pool-name: SpringBootBoilerplateHikariPool
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jta:
    enabled: false

springdoc:
  show-actuator: true

management:
  endpoint:
    health:
      show-details: ALWAYS
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

logging:
  level:
    org.springframework: INFO
    com.springboot: INFO

cors:
  allowed-origins:
    - http://localhost:3000

jwt:
  secretKey: ${JWT_SECRET_KEY:secret}
  issuer: ${JWT_ISSUER:nul-backend}
  expirationMinute: 10

swagger:
  contact-name: PROJECT-NUL
  contact-mail: ${SWAGGER_CONTACT_MAIL:}
  contact-url: https://github.com/PROJECT-NUL
  app-name: NUL Backend
  app-description: "NUL Backend API"
  app-version: 1.0.0
  app-license-url: https://www.apache.org/licenses/LICENSE-2.0.html
  app-license: Apache 2.0
